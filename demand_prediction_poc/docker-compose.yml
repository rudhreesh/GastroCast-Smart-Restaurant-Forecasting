version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: demand_user
      POSTGRES_PASSWORD: demand_password
      POSTGRES_DB: demand_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  postgres_data:
